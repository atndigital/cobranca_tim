<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Faturas ATN x TIM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #F4F6F9;
}

header {
  background: #1E88E5;
  color: white;
  padding: 15px;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

#modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
}

.modal-box {
  background: white;
  padding: 20px;
  width: 300px;
  margin: 100px auto;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h2>📊 Dashboard de Faturas</h2>
</header>

<div class="container">

<div class="card">
  <button onclick="abrirModal()">⚙️ Configurar</button>
  <button onclick="carregarDados()">🔄 Atualizar</button>
  <input type="file" id="fileInput">
  <button onclick="uploadExcel()">📂 Importar Excel</button>
</div>

<div class="card">
  <h3>Resumo</h3>
  <div id="grafico"></div>
</div>

<div class="card">
  <h3>Status</h3>
  <div id="status"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">

    <h3>Configuração</h3>

    <input id="url" placeholder="Supabase URL"><br><br>
    <input id="key" placeholder="Anon Key"><br><br>
    <input id="webhook" placeholder="Webhook n8n"><br><br>

    <button onclick="salvarConfig()">Salvar</button>
    <button onclick="fecharModal()">Fechar</button>

  </div>
</div>

<script>

/* =========================
   CONFIG
========================= */

let supabase = null;

function salvarConfig() {
  const url = document.getElementById("url").value;
  const key = document.getElementById("key").value;
  const webhook = document.getElementById("webhook").value;

  localStorage.setItem("supabase_url", url);
  localStorage.setItem("supabase_key", key);
  localStorage.setItem("webhook", webhook);

  conectarSupabase();
  setStatus("Configuração salva", "green");
}

function conectarSupabase() {
  const url = localStorage.getItem("supabase_url");
  const key = localStorage.getItem("supabase_key");

  if (!url || !key) {
    setStatus("Configure o Supabase", "red");
    return;
  }

  supabase = window.supabase.createClient(url, key);
}

/* =========================
   DASHBOARD
========================= */

async function carregarDados() {
  if (!supabase) {
    setStatus("Sem conexão com banco", "red");
    return;
  }

  const { data, error } = await supabase
    .from("faturas")
    .select("*");

  if (error) {
    setStatus(error.message, "red");
    return;
  }

  montarGrafico(data);
}

function montarGrafico(dados) {
  const valores = dados.map(d => d.valor);
  const nomes = dados.map(d => d.nome);

  const trace = {
    x: nomes,
    y: valores,
    type: "bar"
  };

  Plotly.newPlot("grafico", [trace]);
}

/* =========================
   EXCEL
========================= */

function uploadExcel() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = async (e) => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);

    for (let item of json) {
      await salvarFatura(item);
    }

    setStatus("Excel importado", "green");
    carregarDados();
  };

  reader.readAsArrayBuffer(file);
}

/* =========================
   SUPABASE INSERT
========================= */

async function salvarFatura(item) {
  if (!supabase) return;

  await supabase.from("faturas").insert([
    {
      nome: item.nome || item.Nome,
      valor: item.valor || item.Valor
    }
  ]);
}

/* =========================
   N8N WEBHOOK
========================= */

async function enviarWebhook(dados) {
  const url = localStorage.getItem("webhook");

  if (!url) return;

  await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(dados)
  });
}

/* =========================
   UI
========================= */

function abrirModal() {
  document.getElementById("modal").style.display = "block";
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}

function setStatus(msg, color) {
  const el = document.getElementById("status");
  el.innerText = msg;
  el.style.color = color;
}

/* =========================
   INIT
========================= */

document.addEventListener("DOMContentLoaded", () => {
  conectarSupabase();
  carregarDados();
});

</script>

</body>
</html>
